<!DOCTYPE html>
<html>
<head>
<title>Debugging Demo</title>

<script>
function test()
{
    let x = 10;
    let y = 20;

    console.log("Value of x =", x);
    console.log("Value of y =", y);

    alert("Check Console in DevTools");
}
</script>

</head>

<body>

<h2>Debugging Example</h2>

<button onclick="test()">Run Script</button>

</body>
</html>
