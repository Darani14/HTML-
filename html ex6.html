<!DOCTYPE html>
<html>
<head>
<title>Event Feedback</title>

<style>
body{
    font-family:Arial;
    margin:20px;
}

img{
    width:200px;
    height:150px;
}
</style>

<script>

function validatePhone()
{
    let phone=document.getElementById("phone").value;

    if(phone.length!=10)
    {
        alert("Phone number must contain 10 digits");
    }
}

function showFee()
{
    let fee=document.getElementById("event").value;

    document.getElementById("fee").innerHTML=
    "Selected Event Fee: ₹"+fee;
}

function submitForm()
{
    alert("Feedback Submitted Successfully");
}

function enlargeImage(img)
{
    img.style.width="400px";
    img.style.height="300px";
}

function countChars()
{
    let count=document.getElementById("feedback").value.length;

    document.getElementById("count").innerHTML=
    "Characters: "+count;
}

</script>

</head>

<body>

<h2>Event Feedback Form</h2>

Phone Number:

<input type="text"
id="phone"
onblur="validatePhone()">

<br><br>

Select Event:

<select id="event" onchange="showFee()">
<option value="">Choose Event</option>
<option value="100">Sports Day</option>
<option value="200">Music Event</option>
<option value="300">Food Festival</option>
</select>

<p id="fee"></p>

<img src="https://picsum.photos/200/150"
ondblclick="enlargeImage(this)"
alt="Event Image">

<p>Double-click image to enlarge</p>

Feedback:

<br>

<textarea
id="feedback"
rows="5"
cols="40"
onkeyup="countChars()">
</textarea>

<p id="count">Characters: 0</p>

<button onclick="submitForm()">
Submit
</button>

</body>
</html>
