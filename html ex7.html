<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Invite with Media Events</title>

<style>
body{
    font-family: Arial, sans-serif;
    text-align: center;
    margin-top: 30px;
}

video{
    border: 3px solid black;
}

#msg{
    color: green;
    font-weight: bold;
}
</style>

<script>

function videoReady()
{
    document.getElementById("msg").innerHTML =
    "Video ready to play";
}

window.onbeforeunload = function()
{
    return "You have not completed the form. Are you sure you want to leave?";
};

</script>

</head>

<body>

<h1>Community Event Promo Video</h1>

<video width="500" controls oncanplay="videoReady()">

<source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">

Your browser does not support HTML5 video.

</video>

<br><br>

<p id="msg"></p>

</body>
</html>
